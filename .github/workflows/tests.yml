name: tests

# push 하거나 PR을 열 때마다 자동으로 실행된다.
# 옛 app.py가 안 지워진 채 push되어 팀원이 에러를 만난 사건처럼, 코드
# 버전이 안 맞는 상태를 push 시점에 미리 잡아내는 게 목적이다.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for syntax errors (모든 .py 파일이 import 가능한지)
        run: |
          python -m compileall -q segment_discovery churn_prediction webapp shared config.py

      - name: Run tests
        run: |
          python -m pytest tests/ -v
